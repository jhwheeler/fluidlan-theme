# Fluidlan Light — tmux theme
# Generated from palette.json — do not edit by hand.
# Run: source-file /path/to/fluidlan-light.conf

# Core bar
set -g status-style "bg=#c4c0b8,fg=#7c48b0"
set -g status-interval 1
set -g status-left-length 80
set -g status-right-length 120
set -g status-left "#[fg=#2b6cb3]Sessions: #(~/.tmux/scripts/sessions.sh)#[fg=#9088a0]│ #[fg=#2b6cb3]Windows: "
set -g status-left-length 60
set -g status-right "#[fg=#701888]%H:%M:%S #[fg=#2e2c36]W%V #[fg=#1050a8]%a %Y-%m-%d"

# Window styles
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=#701888,bold"
set -g window-status-format " #I:#W "
set -g window-status-style "fg=#9990a8"
set -g window-status-activity-style "fg=#488820,bg=#dcd8d0,bold"
set -g window-status-bell-style "fg=#c81a16,bg=#dcd8d0,bold"
set -g window-status-separator ""

# Pane / copy / popup styles
set -g pane-border-style "fg=#bcb8b0"
set -g pane-active-border-style "fg=#701888"
set -g display-panes-colour "#1050a8"
set -g display-panes-active-colour "#6838a0"
set -g copy-mode-match-style "bg=#1050a8,fg=#dcd8d0,bold"
set -g copy-mode-current-match-style "bg=#008050,fg=#dcd8d0,bold"
set -g copy-mode-mark-style "bg=#c81a16,fg=#dcd8d0"

# Command and mode styles
set -g message-style "bg=#2b78c0,fg=#dcd8d0"
set -g message-command-style "bg=#6838a0,fg=#dcd8d0"
set -g mode-style "bg=#1050a8,fg=#dcd8d0"

# Misc
set -g clock-mode-colour "#1050a8"
