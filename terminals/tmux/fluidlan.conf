# Fluidlan Dark — tmux theme
# Generated from palette.json — do not edit by hand.
# Run: source-file /path/to/fluidlan.conf

# Core bar
set -g status-style "bg=#34323e,fg=#b888e2"
set -g status-interval 1
set -g status-left-length 80
set -g status-right-length 120
set -g status-left "#[fg=#4f97d7]Sessions: #(~/.tmux/scripts/sessions.sh)#[fg=#9a9aba]│ #[fg=#4f97d7]Windows: "
set -g status-left-length 60
set -g status-right "#[fg=#bc6ec5]%H:%M:%S #[fg=#c6c6c6]W%V #[fg=#4f97d7]%a %Y-%m-%d"

# Window styles
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=#bc6ec5,bold"
set -g window-status-format " #I:#W "
set -g window-status-style "fg=#c6c6c6"
set -g window-status-activity-style "fg=#c9b068,bg=#212026,bold"
set -g window-status-bell-style "fg=#e0211d,bg=#212026,bold"
set -g window-status-separator ""

# Pane / copy / popup styles
set -g pane-border-style "fg=#3a3a3a"
set -g pane-active-border-style "fg=#bc6ec5"
set -g display-panes-colour "#4f97d7"
set -g display-panes-active-colour "#cfc070"
set -g copy-mode-match-style "bg=#4f97d7,fg=#212026,bold"
set -g copy-mode-current-match-style "bg=#20af81,fg=#212026,bold"
set -g copy-mode-mark-style "bg=#e0211d,fg=#212026"

# Command and mode styles
set -g message-style "bg=#0087d7,fg=#212026"
set -g message-command-style "bg=#cfc070,fg=#212026"
set -g mode-style "bg=#4f97d7,fg=#212026"

# Misc
set -g clock-mode-colour "#4f97d7"

